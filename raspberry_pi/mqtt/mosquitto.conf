# ============================================================
# mosquitto.conf — Mosquitto 2.0.22 compatible
# Fixes:
#   • keepalive_interval retiré (invalide depuis Mosquitto 2.0)
#   • message_size_limit → max_packet_size (déprécié, warning logs)
#   • password_file → /mosquitto/data/passwd
#     /mosquitto/config est monté :ro (bind mount Docker) → non inscriptible.
#     /mosquitto/data  est un volume nommé Docker → inscriptible.
# ============================================================

# --- Listener principal ---
listener 1883
protocol mqtt

# --- Authentification ---
allow_anonymous false
# IMPORTANT : passwd dans /data (volume nommé writable), PAS dans /config (:ro)
password_file /mosquitto/data/passwd

# --- ACL ---
acl_file /mosquitto/config/acl

# --- Persistance ---
persistence true
persistence_location /mosquitto/data/

# --- Logs ---
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# --- Sécurité réseau ---
max_connections -1

# Taille max d'un paquet MQTT (max_packet_size remplace message_size_limit)
max_packet_size 262144

# Keep-alive max accepté côté serveur (en secondes)
max_keepalive 120
